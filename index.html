<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WanderPlan – Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card fadeUp">

    <div class="auth-logo">
      <h2>Wander<span>Plan</span> ✈</h2>
      <p>Your personal travel companion</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="login-form">
      <div class="error-msg" id="login-error"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter your username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password"/>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="handleLogin()">Login</button>
      <div class="auth-divider">or</div>
      <p style="text-align:center;font-size:0.82rem;color:var(--muted)">
        Don't have an account?
        <a href="#" onclick="switchTab('signup')" style="color:var(--primary);font-weight:600">Sign up</a>
      </p>
    </div>

    <!-- SIGNUP FORM -->
    <div class="auth-form" id="signup-form">
      <div class="error-msg" id="signup-error"></div>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="signup-fname" placeholder="First name"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="signup-lname" placeholder="Last name"/>
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signup-username" placeholder="Choose a username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Create password (min 6 chars)"/>
      </div>
      <button class="btn btn-accent" style="width:100%;margin-top:8px" onclick="handleSignup()">Create Account</button>
      <div class="auth-divider">or</div>
      <p style="text-align:center;font-size:0.82rem;color:var(--muted)">
        Already have an account?
        <a href="#" onclick="switchTab('login')" style="color:var(--primary);font-weight:600">Login</a>
      </p>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  // Redirect if already logged in
  if(localStorage.getItem('wp_current_user')) {
    window.location.href = 'dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t,i) => {
      t.classList.toggle('active', (tab === 'login' && i===0) || (tab === 'signup' && i===1));
    });
    document.getElementById('login-form').classList.toggle('active', tab === 'login');
    document.getElementById('signup-form').classList.toggle('active', tab === 'signup');
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('signup-error').style.display = 'none';
  }

  function handleLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');

    if (!username || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block'; return;
    }

    const users = JSON.parse(localStorage.getItem('wp_users') || '[]');
    const user = users.find(u => u.username === username && u.password === password);

    if (!user) {
      errEl.textContent = 'Incorrect username or password.';
      errEl.style.display = 'block'; return;
    }

    localStorage.setItem('wp_current_user', JSON.stringify(user));
    showToast('Welcome back, ' + user.fname + '! 👋');
    setTimeout(() => window.location.href = 'dashboard.html', 900);
  }

  function handleSignup() {
    const fname    = document.getElementById('signup-fname').value.trim();
    const lname    = document.getElementById('signup-lname').value.trim();
    const username = document.getElementById('signup-username').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const errEl    = document.getElementById('signup-error');

    if (!fname || !lname || !username || !email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.style.display = 'block'; return;
    }

    const users = JSON.parse(localStorage.getItem('wp_users') || '[]');
    if (users.find(u => u.username === username)) {
      errEl.textContent = 'Username already taken.';
      errEl.style.display = 'block'; return;
    }

    const newUser = { fname, lname, username, email, password };
    users.push(newUser);
    localStorage.setItem('wp_users', JSON.stringify(users));
    localStorage.setItem('wp_current_user', JSON.stringify(newUser));
    showToast('Account created! Welcome, ' + fname + ' 🎉');
    setTimeout(() => window.location.href = 'dashboard.html', 900);
  }
</script>
</body>
</html>
